services:
  minio:
    image: ${MINIO_IMAGE:-quay.io/minio/minio:latest}
    pull_policy: missing
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123}
      MINIO_DOMAIN: minio
    ports:
      - "${NOVA_ENV_MINIO_PORT}:9000"
      - "${NOVA_ENV_MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data
    networks:
      iceberg_net:
        aliases:
          - warehouse.minio
          - novarocks.minio

  mc:
    image: ${MINIO_MC_IMAGE:-quay.io/minio/mc:latest}
    pull_policy: missing
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set minio http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-admin123}; do
        echo 'waiting for minio';
        sleep 1;
      done;
      /usr/bin/mc mb --ignore-existing minio/warehouse;
      /usr/bin/mc mb --ignore-existing minio/novarocks;
      "
    networks:
      - iceberg_net

  rest:
    image: ${ICEBERG_REST_IMAGE:-apache/iceberg-rest-fixture:1.8.1}
    pull_policy: missing
    depends_on:
      mc:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-admin123}
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: ${NOVA_ENV_REST_WAREHOUSE_URI}
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      # The default `jdbc:sqlite::memory:` gives every JDBC pool connection a
      # private in-memory database, so concurrent requests see "no such table:
      # iceberg_tables" once the pool grows past one connection. Pin to a
      # container-local file path: cleared on container restart, shared across
      # all pool connections.
      CATALOG_URI: jdbc:sqlite:/tmp/iceberg-rest-catalog.db
    ports:
      - "${NOVA_ENV_REST_PORT}:8181"
    networks:
      - iceberg_net

  spark:
    image: ${SPARK_ICEBERG_IMAGE:-tabulario/spark-iceberg:3.5.5_1.8.1}
    pull_policy: missing
    depends_on:
      rest:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-admin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-admin123}
      AWS_REGION: us-east-1
      SPARK_LOCAL_HOSTNAME: localhost
    ports:
      - "${NOVA_ENV_SPARK_UI_PORT}:4040"
    volumes:
      - "${NOVA_ENV_RUNTIME_DIR}:/opt/novarocks-env:ro"
    entrypoint: ["/bin/bash", "-lc"]
    command: ["trap 'exit 0' TERM INT; sleep infinity & wait"]
    networks:
      - iceberg_net

volumes:
  minio-data:

networks:
  iceberg_net:
